services:
  - type: web
    name: lan-queue-system
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PIN
        sync: false
      - key: DB_PATH
        value: /var/data/queue.db
    disk:
      name: queue-data
      mountPath: /var/data
      sizeGB: 1
